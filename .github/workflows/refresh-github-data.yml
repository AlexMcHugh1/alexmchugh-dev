name: Refresh GitHub data

# Regenerates data/github.json from the GitHub GraphQL API so the static
# site's pinned repos and contribution calendar stay current without a
# runtime fetch.

on:
  schedule:
    # Every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch GitHub data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/fetch-github.mjs

      - name: Commit if changed
        run: |
          if ! git diff --quiet -- data/github.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/github.json
            git commit -m "chore(data): refresh GitHub pinned repos & calendar"
            git push
          else
            echo "No changes to data/github.json"
          fi
